<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mariage Grâce & Joel – 4 Juillet 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --soft-gold:   #C5A367;
  --powder-rose: #E8C5C5;
  --lavender:    #D6D1F0;
  --cream-bg:    #F9F6F1;
  --text-dark:   #423E3B;
  --white:       #FFFFFF;
}

html { scroll-behavior: smooth; }
body { font-family: 'Jost', sans-serif; background: var(--cream-bg); color: var(--text-dark); overflow-x: hidden; line-height: 1.4; }

/* --- HERO --- */
.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 60px; /* Réduit */
  overflow: hidden;
  text-align: center;
}

.hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('DSCF3391.JPG');
    background-size: cover;
    background-position: center 15%;
    z-index: -1;
}

.hero-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.2) 60%, rgba(0,0,0,0.7) 100%);
    z-index: 0;
}

.scroll-arrow {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--white);
    font-size: 1.8rem;
    animation: bounce 2s infinite;
    z-index: 5;
    text-decoration: none;
}

@keyframes bounce {
    0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
    40% {transform: translateX(-50%) translateY(-10px);}
}

.hero-content {
  position: relative; z-index: 2;
  padding: 0 20px;
  animation: fadeUp 1.5s ease-out both;
}

.hero-intro { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; color: var(--white); text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
.invitation-text { letter-spacing: 3px; font-size: 0.65rem; font-weight: 500; margin-top: 5px; margin-bottom: 10px; }
h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 12vw, 4.5rem); color: var(--white); font-weight: 300; line-height: 0.8; margin-bottom: 5px; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
.ampersand { color: var(--soft-gold); font-size: 2.2rem; display: inline-block; font-family: 'Cormorant Garamond', serif; font-style: italic; }
.hero-date { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: var(--powder-rose); border-top: 1px solid rgba(255,255,255,0.3); display: inline-block; padding-top: 5px; margin-top: 5px; }

/* --- SECTION PROGRAMME --- */
.wrap {
    max-width: 800px;
    margin: 0 auto;
    padding: 40px 25px; /* Réduit de 60px à 40px */
}

.section-header { text-align: center; margin-bottom: 30px; } /* Réduit de 60px à 30px */
.section-title { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; }
.section-subtitle { color: var(--soft-gold); font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; }

.timeline { position: relative; margin-top: 20px; }
.timeline-item { 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    text-align: center; 
    margin-bottom: 35px; /* Réduit de 50px à 35px */
    position: relative; 
}

.timeline-item::after {
    content: '';
    width: 1px;
    height: 25px; /* Réduit */
    background: var(--lavender);
    position: absolute;
    bottom: -30px;
}
.timeline-item:last-child::after { display: none; }

.tm-time { font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--soft-gold); letter-spacing: 2px; margin-bottom: 2px; }
.tm-title { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 400; text-transform: uppercase; margin-bottom: 2px; }
.tm-desc { font-size: 0.85rem; color: #777; letter-spacing: 1px; max-width: 300px; }

/* --- CITATION & IMAGE --- */
.quote-box { text-align: center; margin: 40px 0; padding: 0 20px; } /* Réduit de 80px à 40px */
.quote-text { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.3rem; color: var(--text-dark); position: relative; }

.last-image-card {
    border-radius: 0;
    overflow: hidden;
    margin-top: 15px;
    padding: 0 !important;
    background: none;
    box-shadow: none;
}
.last-image-card img { width: 100%; height: auto; display: block; border-radius: 4px; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 500px) {
  .hero { height: 100vh; }
  .section-title { font-size: 1.8rem; }
  .tm-title { font-size: 1.3rem; }
  .wrap { padding: 30px 20px; }
}
</style>
</head>
<body>

<div class="hero">
    <div class="hero-bg"></div>
